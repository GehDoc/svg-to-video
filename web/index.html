<!doctype html>
<html lang="en">
  <head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG to Video</title>
    <meta
      name="description"
      content="Convert your SVG files to MP4 videos directly in your browser. Fast, private, and client-side processing for your animations."
    />
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="SVG to Video Studio" />
    <meta
      property="og:description"
      content="Turn your SVG animations into high-quality MP4 videos."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gehdoc.github.io/svg-to-video/" />
    <!-- JSON-LD for Search Engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SVG to Video",
        "url": "https://gehdoc.github.io/svg-to-video/",
        "description": "Browser-based SVG to MP4 converter."
      }
    </script>
    <script>
      (function () {
        if (window.navigator.webdriver) return;
        if (
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1' ||
          window.location.hostname.includes('192.168.')
        )
          return;
        var el = document.createElement('script');
        el.async = true;
        el.defer = true;
        el.setAttribute(
          'data-website-id',
          '4489aba4-cf29-439e-9491-e36f2a531a63'
        );
        el.setAttribute('data-domains', 'gehdoc.github.io');
        el.setAttribute('data-host-url', 'https://cloud.umami.is');
        el.src = './assets/3rd-party/analytics.js';
        document.head.appendChild(el);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
