<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Animated Background Circle -->
  <circle cx="200" cy="200" r="60" fill="#5e61e6" opacity="0.6">
    <animate attributeName="r" values="60;90;60" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Rotating Square Frame -->
  <rect x="140" y="140" width="120" height="120" fill="none" stroke="#aa3bff" stroke-width="8" rx="15">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 200 200" 
      to="360 200 200" 
      dur="3s" 
      repeatCount="indefinite" />
  </rect>

  <!-- Pulsing Center Point -->
  <circle cx="200" cy="200" r="10" fill="#ffffff">
    <animate attributeName="r" values="10;15;10" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
