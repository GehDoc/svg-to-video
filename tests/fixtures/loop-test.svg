<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#eee" />
  <circle cx="50" cy="50" r="20" fill="#3b82f6">
    <animate 
      attributeName="cx" 
      from="50" 
      to="350" 
      dur="2s" 
      repeatCount="indefinite" />
  </circle>
  <style>
    circle {
      transition: fill 0.5s;
    }
  </style>
</svg>
