name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: 'Testing (Lint, Format, Type-Check, E2E)'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: svg-to-video:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or latest LTS
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks (lint, format, type-check)
        run: npm run check:fast

      # --- E2E Tests (run in Docker) ---

      - name: Set up User IDs for Docker
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Run E2E tests in Docker
        # Override the service's entrypoint to run npm, then execute the test script
        run: >
          docker compose run
          --rm
          -e CI=true 
          -e DOCKER_TEST=true 
          -w /app/data
          --entrypoint "npm"
          svg-to-video run test:e2e

  web-tests:
    name: 'Web Studio Tests (E2E)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Web E2E tests
        run: npm run test:e2e -w web
