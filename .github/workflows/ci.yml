name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-type-check:
    name: 'Lint and Type-Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run fast checks
        run: npm run check:fast

  cli-tests:
    name: 'CLI E2E Tests (Docker)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and load Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: svg-to-video:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set up User IDs for Docker
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
      - name: Run E2E tests in Docker
        run: >
          docker compose run
          --rm
          -e CI=true 
          -v ${{ github.workspace }}/node_modules:/app/node_modules
          -w /app/data
          --entrypoint "npm"
          svg-to-video run test:cli

  web-unit-tests:
    name: 'Web Studio Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Web Unit tests
        run: npm run test:unit -w web

  web-e2e-tests:
    name: 'Web Studio E2E Tests'
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Web E2E tests
        run: npm run test:web -w web

  storybook-tests:
    name: 'Storybook Tests (${{ matrix.theme }})'
    needs: [build-web]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [light, dark]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Storybook Tests
        run: |
          npx start-server-and-test "npm run storybook -w web" http://localhost:6006 \
          "STORYBOOK_THEME=${{ matrix.theme }} npm run test:storybook -w web"

  visual-tests:
    name: 'Visual Regression Tests'
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Visual Regression tests
        run: npm run test:visual -w web

  build-web:
    name: 'Build Web Studio'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Build
        run: npm run build -w web
      - name: Build Storybook
        run: npm run build-storybook -w web
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: |
            web/dist
