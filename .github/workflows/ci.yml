name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: 'Testing (Lint, Format, Type-Check, E2E)'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: svg-to-video:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded from 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fast checks (lint, format, type-check)
        run: npm run check:fast

      # --- E2E Tests (run in Docker) ---

      - name: Set up User IDs for Docker
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Run E2E tests in Docker
        # Override the service's entrypoint to run npm, then execute the test script
        run: >
          docker compose run
          --rm
          -e CI=true 
          -w /app/data
          --entrypoint "npm"
          svg-to-video run test:cli

  web-tests:
    name: 'Web Studio Tests (E2E)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Web E2E tests
        run: npm run test:web
      - name: Run Web Unit tests
        run: npm run test:unit
      - name: Run Storybook A11Y and Interaction tests
        run: |
          npx start-server-and-test "npm run storybook -w web" http://localhost:6006 \
          "STORYBOOK_THEME=light npm run test:storybook -w web && STORYBOOK_THEME=dark npm run test:storybook -w web"
      - name: Run Visual Regression tests
        run: npm run test:visual
