name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-type-check:
    name: 'Lint and Type-Check'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run fast checks
        run: npm run check:fast

  cli-tests:
    name: 'CLI E2E Tests (Docker)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and load Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: svg-to-video:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set up User IDs for Docker
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV
      - name: Run E2E tests in Docker
        run: >
          docker compose run
          --rm
          -e CI=true 
          -w /app/data
          --entrypoint "npm"
          svg-to-video run test:cli

  web-unit-tests:
    name: 'Web Studio Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Web Unit tests
        run: npm run test:unit -w web

  web-e2e-tests:
    name: 'Web Studio E2E Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Web E2E tests
        run: npm run test:web -w web

  storybook-tests:
    name: 'Storybook Tests (${{ matrix.theme }})'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        theme: [light, dark]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Storybook Tests
        run: |
          npm run storybook -w web &
          npx wait-on http://localhost:6006
          STORYBOOK_THEME=${{ matrix.theme }} npm run test:storybook -w web

  visual-tests:
    name: 'Visual Regression Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Visual Regression tests
        run: npm run test:visual -w web

  build-web:
    name: 'Build Web Studio'
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Build
        run: npm run build -w web
      - name: Build Storybook
        run: npm run build-storybook -w web

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Demo Video
        run: |
          mkdir -p web/dist/assets
          GENERATE_DEMO=true npm run test:web -w web -- tests/demo.spec.ts
          VIDEO_PATH=$(find web/test-results -name "*.webm" | head -n 1)
          if [ -n "$VIDEO_PATH" ]; then
            cp "$VIDEO_PATH" web/dist/assets/demo.webm
          else
            echo "Warning: Demo video not found"
          fi

      - name: Upload Demo Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-video
          path: web/dist/assets/demo.webm
          if-no-files-found: warn

  build-and-deploy:
    name: 'Build and Deploy'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - lint-and-type-check
      - cli-tests
      - web-unit-tests
      - web-e2e-tests
      - storybook-tests
      - visual-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Build Web Studio
        run: npm run build -w web

      - name: Build Storybook
        run: npm run build-storybook -w web

      - name: Generate Demo Video
        run: |
          mkdir -p web/dist/assets
          GENERATE_DEMO=true npm run test:web -w web -- tests/demo.spec.ts
          # Move the recorded video to the dist assets
          # Playwright saves video in test-results/demo-Generate-Demo-Video-Web-Studio-chromium/video.webm
          # We need to find the exact path or use a predictable one if possible
          VIDEO_PATH=$(find web/test-results -name "*.webm" | head -n 1)
          if [ -n "$VIDEO_PATH" ]; then
            cp "$VIDEO_PATH" web/dist/assets/demo.webm
          else
            echo "Warning: Demo video not found"
          fi

      - name: Upload Demo Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-video-deploy
          path: web/dist/assets/demo.webm
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
