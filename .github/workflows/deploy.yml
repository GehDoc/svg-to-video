name: Deploy Web Studio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Wait for all CI test jobs to complete successfully
    needs:
      - lint-and-type-check
      - cli-tests
      - web-unit-tests
      - web-e2e-tests
      - storybook-tests
      - visual-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Build Web Studio
        run: npm run build -w web

      - name: Build Storybook
        run: npm run build-storybook -w web

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages
