services:
  svg-to-video:
    build:
      context: .
      target: tester
    image: svg-to-video:latest
    volumes:
      - .:/app/data:Z
    environment:
      - NODE_PATH=/app/node_modules
    # This maps the internal 'node' user to your current local user
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app/data
    # This is a security feature to prevent the container from gaining root
    security_opt:
      - no-new-privileges:true
    shm_size: '2gb'
